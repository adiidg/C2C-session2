<div class="container">

  <!-- ============================================== -->
  <!-- IF USER IS LOGGED IN: SHOW THE MAIN APP        -->
  <!-- ============================================== -->
  @if (user$ | async; as user) {
  <nav class="navbar">
    <h2 class="logo">My First Angular App</h2>
    <div class="links">
      <a routerLink="/addition" routerLinkActive="active">Addition</a>
      <a routerLink="/text-loop" routerLinkActive="active">TextLoop</a>
      <a routerLink="/tasks" routerLinkActive="active">CRUD Task</a>

      <!-- Logout Button -->
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </nav>

  <div class="content">
    <router-outlet></router-outlet>
  </div>

  } @else {
  <!-- ============================================== -->
  <!-- IF USER IS LOGGED OUT: SHOW LOGIN FORM         -->
  <!-- ============================================== -->
  <div class="auth-container">
    <div class="auth-card">
      <h2>Welcome</h2>
      <p>Sign in to access the app</p>

      <!-- Inputs -->
      <input type="email" [(ngModel)]="email" placeholder="Email" class="auth-input">
      <input type="password" [(ngModel)]="password" placeholder="Password" class="auth-input">

      <!-- ⚠️ ERROR MESSAGES WILL APPEAR HERE ⚠️ -->
      @if (errorMessage) {
      <p class="error-msg">{{ errorMessage }}</p>
      }

      <!-- Actions -->
      <div class="auth-actions">
        <button class="login-btn" (click)="login()">Login</button>
        <button class="register-btn" (click)="register()">Register</button>
      </div>
    </div>
  </div>
  }

</div>
